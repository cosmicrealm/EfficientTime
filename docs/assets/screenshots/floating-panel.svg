<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="EfficientTime floating execution panel preview">
  <defs>
    <linearGradient id="desktop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9f4ee"/>
      <stop offset="100%" stop-color="#f5e6ee"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8fbff"/>
      <stop offset="55%" stop-color="#eefcf1"/>
      <stop offset="100%" stop-color="#fff4f2"/>
    </linearGradient>
    <filter id="panel-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#4f7d81" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#desktop)"/>
  <text x="72" y="80" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="22" font-weight="800" fill="#214044">桌面常驻实时执行面板</text>
  <text x="72" y="112" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#577175">当前任务、剩余时间、附近任务都可以在桌面上直接看到。</text>

  <rect x="238" y="142" width="724" height="286" rx="22" fill="#eef9f6" stroke="#c7e3dc" filter="url(#panel-shadow)"/>
  <rect x="262" y="166" width="676" height="34" rx="12" fill="#f9ffff"/>
  <circle cx="284" cy="183" r="6" fill="#ff4f58"/>
  <text x="304" y="188" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="800" fill="#1c3034">实时执行</text>
  <text x="398" y="188" font-family="SFMono-Regular,Menlo,monospace" font-size="13" fill="#6b7b7e">09:42</text>

  <rect x="262" y="214" width="676" height="112" rx="18" fill="url(#card)" stroke="#78c7cb"/>
  <circle cx="326" cy="270" r="42" fill="#e9fbff" stroke="#ffffff" stroke-width="8"/>
  <path d="M326 228 A42 42 0 1 1 295 298" fill="none" stroke="#22c7b8" stroke-width="8" stroke-linecap="round"/>
  <text x="306" y="268" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="900" fill="#1d3034">18</text>
  <text x="312" y="286" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="10" font-weight="800" fill="#718183">分钟</text>
  <rect x="392" y="236" width="66" height="24" rx="12" fill="#1aa7a5" fill-opacity="0.16"/>
  <text x="409" y="252" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="800" fill="#14908f">进行中</text>
  <text x="392" y="286" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="900" fill="#1b2d31">阅读论文综述</text>
  <text x="392" y="310" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#65777a">09:30-10:30 · 还剩 18 分钟</text>
  <rect x="760" y="248" width="72" height="34" rx="10" fill="#0f8ea0"/>
  <text x="783" y="270" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="800" fill="#fff">完成</text>
  <rect x="846" y="248" width="64" height="34" rx="10" fill="#ffffff" stroke="#cfe3e3"/>
  <text x="864" y="270" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="800" fill="#35717a">跳过</text>

  <text x="274" y="356" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="800" fill="#5d7072">附近任务</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <rect x="274" y="372" width="200" height="34" rx="10" fill="#ffffff" opacity="0.76"/>
    <rect x="286" y="381" width="4" height="16" rx="2" fill="#8cb7bc"/>
    <text x="300" y="394" font-size="12" fill="#35494c">09:00 查看投资账户</text>
    <rect x="492" y="372" width="200" height="34" rx="10" fill="#ffffff" opacity="0.76"/>
    <rect x="504" y="381" width="4" height="16" rx="2" fill="#22c7b8"/>
    <text x="518" y="394" font-size="12" fill="#35494c">09:30 阅读论文综述</text>
    <rect x="710" y="372" width="200" height="34" rx="10" fill="#ffffff" opacity="0.76"/>
    <rect x="722" y="381" width="4" height="16" rx="2" fill="#67b7ff"/>
    <text x="736" y="394" font-size="12" fill="#35494c">10:40 写项目代码</text>
  </g>

  <rect x="506" y="452" width="188" height="44" rx="22" fill="#eef9f6" stroke="#c7e3dc"/>
  <circle cx="536" cy="474" r="18" fill="#e8fbff" stroke="#22c7b8" stroke-width="4"/>
  <text x="566" y="480" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="800" fill="#1d3034">折叠后小条显示</text>
</svg>
