<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="EfficientTime floating execution panel preview">
  <defs>
    <linearGradient id="desktop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9f4ee"/>
      <stop offset="100%" stop-color="#f8e5ef"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbf8e7"/>
      <stop offset="55%" stop-color="#e6f7ff"/>
      <stop offset="100%" stop-color="#fff0f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#4f7d81" flood-opacity="0.18"/>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: SFMono-Regular, Menlo, monospace; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#desktop)"/>
  <text class="ui" x="72" y="80" font-size="22" font-weight="900" fill="#214044">桌面常驻实时执行面板</text>
  <text class="ui" x="72" y="112" font-size="15" fill="#577175">秒级倒计时、附近任务、透明度和任务操作都在悬浮窗里完成。</text>

  <rect x="192" y="140" width="816" height="310" rx="22" fill="url(#panel)" stroke="#b6d7d0" filter="url(#shadow)"/>
  <rect x="216" y="164" width="768" height="38" rx="12" fill="#ffffff" fill-opacity="0.74"/>
  <circle cx="238" cy="183" r="6" fill="#ff3b30"/>
  <text class="ui" x="258" y="188" font-size="15" font-weight="900" fill="#1c3034">实时执行</text>
  <text class="mono" x="344" y="188" font-size="13" fill="#6b7b7e">18:22:14</text>
  <text class="ui" x="728" y="188" font-size="12" fill="#65777a">透明度</text>
  <rect x="778" y="177" width="96" height="6" rx="3" fill="#d4e8e6"/>
  <rect x="778" y="177" width="64" height="6" rx="3" fill="#0f8ea0"/>
  <circle cx="842" cy="180" r="8" fill="#0f8ea0"/>
  <rect x="892" y="171" width="70" height="24" rx="8" fill="#eef7f5"/>
  <text class="ui" x="912" y="187" font-size="12" font-weight="800" fill="#0f8191">主窗口</text>

  <rect x="216" y="218" width="768" height="132" rx="18" fill="#ffffff" fill-opacity="0.68" stroke="#9bd3ca"/>
  <circle cx="300" cy="284" r="48" fill="#efffff" stroke="#d8f7e6" stroke-width="10"/>
  <path d="M300 236 A48 48 0 1 1 257 306" fill="none" stroke="#28d5c5" stroke-width="10" stroke-linecap="round"/>
  <text class="ui" x="280" y="282" font-size="22" font-weight="900" fill="#1d3034">18</text>
  <text class="ui" x="279" y="301" font-size="10" font-weight="800" fill="#718183">分 42 秒</text>

  <rect x="382" y="242" width="66" height="24" rx="12" fill="#f59e0b" fill-opacity="0.16"/>
  <text class="ui" x="399" y="258" font-size="12" font-weight="900" fill="#bd6f00">进行中</text>
  <text class="ui" x="382" y="292" font-size="26" font-weight="900" fill="#1b2d31">阅读论文综述</text>
  <text class="ui" x="382" y="318" font-size="14" fill="#65777a">18:00-18:40 · 还剩 18 分 42 秒</text>

  <rect x="742" y="250" width="76" height="34" rx="10" fill="#0f8ea0"/>
  <text class="ui" x="767" y="272" font-size="13" font-weight="900" fill="#fff">完成</text>
  <rect x="830" y="250" width="76" height="34" rx="10" fill="#e0f5fb"/>
  <text class="ui" x="855" y="272" font-size="13" font-weight="900" fill="#0a8cab">跳过</text>
  <rect x="742" y="298" width="76" height="34" rx="10" fill="#f0e7ff"/>
  <text class="ui" x="761" y="320" font-size="13" font-weight="900" fill="#8b5cf6">推迟</text>

  <text class="ui" x="228" y="382" font-size="14" font-weight="900" fill="#5d7072">附近任务</text>
  <g class="ui">
    <rect x="228" y="398" width="220" height="34" rx="10" fill="#ffffff" fill-opacity="0.72"/>
    <rect x="240" y="407" width="4" height="16" rx="2" fill="#33a852"/>
    <text x="254" y="420" font-size="12" fill="#35494c">17:30 查看投资账户</text>
    <rect x="468" y="398" width="220" height="34" rx="10" fill="#ffffff" fill-opacity="0.72"/>
    <rect x="480" y="407" width="4" height="16" rx="2" fill="#f59e0b"/>
    <text x="494" y="420" font-size="12" fill="#35494c">18:00 阅读论文综述</text>
    <rect x="708" y="398" width="220" height="34" rx="10" fill="#ffffff" fill-opacity="0.72"/>
    <rect x="720" y="407" width="4" height="16" rx="2" fill="#268bff"/>
    <text x="734" y="420" font-size="12" fill="#35494c">18:50 写项目代码</text>
  </g>

  <rect x="500" y="468" width="200" height="36" rx="18" fill="#eef9f6" stroke="#c7e3dc"/>
  <circle cx="526" cy="486" r="9" fill="#ff3b30"/>
  <text class="ui" x="546" y="491" font-size="13" font-weight="900" fill="#1d3034">折叠后保留醒目标识</text>
</svg>
