<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="EfficientTime AI planning screen preview">
  <defs>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2fbfb"/>
      <stop offset="100%" stop-color="#edf7ff"/>
    </linearGradient>
    <filter id="ai-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#688da0" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="28" fill="url(#ai-bg)"/>
  <rect x="42" y="36" width="1116" height="688" rx="24" fill="#fbffff" filter="url(#ai-shadow)"/>
  <text x="82" y="92" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" font-weight="800" fill="#172d34">智能规划</text>
  <text x="82" y="122" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#738287">把自然语言计划转换成可编辑分时段日程</text>

  <rect x="82" y="156" width="420" height="512" rx="18" fill="#eef9f8"/>
  <text x="110" y="196" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="750" fill="#1d3034">原始计划</text>
  <rect x="110" y="220" width="364" height="54" rx="12" fill="#ffffff" stroke="#d1e3e4"/>
  <text x="128" y="252" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#506064">规划 14:00 到 21:30 · 间隔 10 分钟</text>
  <rect x="110" y="292" width="364" height="250" rx="12" fill="#ffffff" stroke="#d1e3e4"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" fill="#26383d">
    <text x="130" y="330">下午整理 3D viewer 的可视化</text>
    <text x="130" y="365">重新阅读 selfflow 文档</text>
    <text x="130" y="400">梳理音频特征如何注入 dit</text>
    <text x="130" y="435">晚上检查投资账户和明日计划</text>
  </g>
  <rect x="110" y="570" width="364" height="48" rx="14" fill="#0f8ea0"/>
  <text x="228" y="601" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="16" font-weight="800" fill="#ffffff">生成分时段日程</text>

  <rect x="534" y="156" width="584" height="512" rx="18" fill="#f2fbff"/>
  <text x="562" y="196" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="750" fill="#1d3034">日程草稿</text>
  <text x="562" y="222" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" fill="#6f8085">5 个任务 · 预计 300 分钟</text>
  <rect x="838" y="180" width="136" height="36" rx="10" fill="#ffffff" stroke="#cfe1e4"/>
  <text x="864" y="203" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#24515a">目标：今天</text>
  <rect x="990" y="180" width="84" height="36" rx="10" fill="#0f8ea0"/>
  <text x="1018" y="203" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="800" fill="#ffffff">应用</text>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <rect x="562" y="254" width="510" height="72" rx="14" fill="#ffffff" stroke="#d7e7ec"/>
    <text x="588" y="282" font-family="SFMono-Regular,Menlo,monospace" font-size="13" fill="#6f8085">Start 14:00   End 15:00   时长 60</text>
    <text x="588" y="308" font-size="17" font-weight="800" fill="#1f2d2f">整理 3D viewer 的可视化</text>
    <rect x="562" y="346" width="510" height="72" rx="14" fill="#ffffff" stroke="#d7e7ec"/>
    <text x="588" y="374" font-family="SFMono-Regular,Menlo,monospace" font-size="13" fill="#6f8085">Start 15:10   End 16:10   时长 60</text>
    <text x="588" y="400" font-size="17" font-weight="800" fill="#1f2d2f">重新阅读 selfflow</text>
    <rect x="562" y="438" width="510" height="72" rx="14" fill="#ffffff" stroke="#d7e7ec"/>
    <text x="588" y="466" font-family="SFMono-Regular,Menlo,monospace" font-size="13" fill="#6f8085">Start 16:20   End 17:20   时长 60</text>
    <text x="588" y="492" font-size="17" font-weight="800" fill="#1f2d2f">生成模型继续梳理</text>
    <rect x="562" y="530" width="510" height="72" rx="14" fill="#ffffff" stroke="#d7e7ec"/>
    <text x="588" y="558" font-family="SFMono-Regular,Menlo,monospace" font-size="13" fill="#6f8085">Start 19:00   End 20:30   时长 90</text>
    <text x="588" y="584" font-size="17" font-weight="800" fill="#1f2d2f">音频特征如何注入 dit</text>
  </g>
</svg>
