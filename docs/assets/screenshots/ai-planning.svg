<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="EfficientTime AI planning screen preview">
  <defs>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2fbfb"/>
      <stop offset="100%" stop-color="#edf7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#688da0" flood-opacity="0.16"/>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font-family: SFMono-Regular, Menlo, monospace; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#ai-bg)"/>
  <rect x="42" y="36" width="1116" height="688" rx="24" fill="#fbffff" filter="url(#shadow)"/>
  <text class="ui" x="82" y="92" font-size="28" font-weight="900" fill="#172d34">智能规划</text>
  <text class="ui" x="82" y="122" font-size="15" fill="#738287">把自然语言、语音输入或粗略列表转换成可编辑的分时段日程</text>

  <rect x="82" y="156" width="430" height="512" rx="18" fill="#eef9f8"/>
  <text class="ui" x="110" y="196" font-size="20" font-weight="800" fill="#1d3034">原始计划</text>
  <rect x="110" y="220" width="120" height="38" rx="11" fill="#ffffff" stroke="#d1e3e4"/>
  <text class="ui" x="132" y="244" font-size="13" font-weight="800" fill="#24515a">开始 14:00</text>
  <rect x="244" y="220" width="120" height="38" rx="11" fill="#ffffff" stroke="#d1e3e4"/>
  <text class="ui" x="266" y="244" font-size="13" font-weight="800" fill="#24515a">结束 21:30</text>
  <rect x="378" y="220" width="106" height="38" rx="11" fill="#ffffff" stroke="#d1e3e4"/>
  <text class="ui" x="400" y="244" font-size="13" font-weight="800" fill="#24515a">间隔 10</text>

  <rect x="110" y="278" width="374" height="226" rx="12" fill="#ffffff" stroke="#d1e3e4"/>
  <g class="ui" font-size="15" fill="#26383d">
    <text x="130" y="316">整理 3D viewer 的可视化</text>
    <text x="130" y="350">重新阅读 selfflow 文档</text>
    <text x="130" y="384">梳理音频特征如何注入 dit</text>
    <text x="130" y="418">晚上检查投资账户和明日计划</text>
  </g>
  <rect x="110" y="522" width="176" height="44" rx="13" fill="#e7f6f7" stroke="#cfe3e4"/>
  <text class="ui" x="148" y="550" font-size="15" font-weight="900" fill="#0f8191">语音录入</text>
  <rect x="302" y="522" width="182" height="44" rx="13" fill="#0f8ea0"/>
  <text class="ui" x="342" y="550" font-size="15" font-weight="900" fill="#ffffff">生成规划建议</text>
  <text class="ui" x="110" y="606" font-size="13" fill="#738287">AI Provider 在设置页配置，规划页不暴露 API Key。</text>

  <rect x="544" y="156" width="574" height="512" rx="18" fill="#f2fbff"/>
  <text class="ui" x="572" y="196" font-size="20" font-weight="800" fill="#1d3034">日程草稿</text>
  <text class="ui" x="572" y="222" font-size="14" fill="#6f8085">5 个任务 · 预计 300 分钟 · 可编辑后应用</text>
  <rect x="838" y="180" width="136" height="36" rx="10" fill="#ffffff" stroke="#cfe1e4"/>
  <text class="ui" x="864" y="203" font-size="13" font-weight="800" fill="#24515a">目标日期</text>
  <rect x="990" y="180" width="92" height="36" rx="10" fill="#0f8ea0"/>
  <text class="ui" x="1012" y="203" font-size="13" font-weight="900" fill="#ffffff">应用</text>

  <g class="ui">
    <rect x="572" y="254" width="510" height="72" rx="14" fill="#ffffff" stroke="#d7e7ec"/>
    <rect x="594" y="272" width="88" height="24" rx="7" fill="#eef8f8" stroke="#cfe1e4"/>
    <text class="mono" x="608" y="289" font-size="12" fill="#506064">Start 14:00</text>
    <rect x="692" y="272" width="78" height="24" rx="7" fill="#eef8f8" stroke="#cfe1e4"/>
    <text class="mono" x="706" y="289" font-size="12" fill="#506064">End 15:00</text>
    <text x="594" y="314" font-size="17" font-weight="900" fill="#1f2d2f">整理 3D viewer 的可视化</text>

    <rect x="572" y="346" width="510" height="72" rx="14" fill="#ffffff" stroke="#d7e7ec"/>
    <rect x="594" y="364" width="88" height="24" rx="7" fill="#eef8f8" stroke="#cfe1e4"/>
    <text class="mono" x="608" y="381" font-size="12" fill="#506064">Start 15:10</text>
    <rect x="692" y="364" width="78" height="24" rx="7" fill="#eef8f8" stroke="#cfe1e4"/>
    <text class="mono" x="706" y="381" font-size="12" fill="#506064">End 16:10</text>
    <text x="594" y="406" font-size="17" font-weight="900" fill="#1f2d2f">重新阅读 selfflow</text>

    <rect x="572" y="438" width="510" height="72" rx="14" fill="#ffffff" stroke="#d7e7ec"/>
    <rect x="594" y="456" width="88" height="24" rx="7" fill="#eef8f8" stroke="#cfe1e4"/>
    <text class="mono" x="608" y="473" font-size="12" fill="#506064">Start 16:20</text>
    <rect x="692" y="456" width="78" height="24" rx="7" fill="#eef8f8" stroke="#cfe1e4"/>
    <text class="mono" x="706" y="473" font-size="12" fill="#506064">End 17:20</text>
    <text x="594" y="498" font-size="17" font-weight="900" fill="#1f2d2f">生成模型继续梳理</text>

    <rect x="572" y="530" width="510" height="72" rx="14" fill="#ffffff" stroke="#d7e7ec"/>
    <rect x="594" y="548" width="88" height="24" rx="7" fill="#eef8f8" stroke="#cfe1e4"/>
    <text class="mono" x="608" y="565" font-size="12" fill="#506064">Start 19:00</text>
    <rect x="692" y="548" width="78" height="24" rx="7" fill="#eef8f8" stroke="#cfe1e4"/>
    <text class="mono" x="706" y="565" font-size="12" fill="#506064">End 20:30</text>
    <text x="594" y="590" font-size="17" font-weight="900" fill="#1f2d2f">音频特征如何注入 dit</text>
  </g>
</svg>
